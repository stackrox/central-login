name: Lint

on:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20.x

      - name: Deps
        run: |
          npm install

      - name: Format
        run: |
          npm run format-check

      - name: Lint
        run: |
          npm run lint
